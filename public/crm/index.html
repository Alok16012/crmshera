  .mob-bottom-nav {

    height: 62px !important; background: #fff !important;
    border-top: 1.5px solid #e8ecf2 !important;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.10) !important;
    display: flex !important; align-items: stretch !important;
    z-index: 9990 !important;
    padding-bottom: env(safe-area-inset-bottom, 0px) !important;
  }
  .mob-nav-item {
    flex: 1 !important; display: flex !important; flex-direction: column !important;
    align-items: center !important; justify-content: center !important; gap: 3px !important;
    cursor: pointer !important; text-decoration: none !important;
    color: #b0bac9 !important; font-weight: 600 !important;
    border: none !important; background: none !important; padding: 0 !important;
    transition: color .15s !important; -webkit-tap-highlight-color: transparent !important;
  }
  .mob-nav-icon { font-size: 21px !important; line-height: 1 !important; display: block !important; }
  .mob-nav-item span:last-child { font-size: 9px !important; letter-spacing: .2px !important; }
  .mob-nav-item.active { color: #3b6ff5 !important; }
  .mob-nav-item.active .mob-nav-icon { transform: scale(1.08) !important; }
}
  </style>
  <body>
    <div id="root"></div>
  <script>
  (function() {
    var timer;

    /* ── ITINERARY OVERLAY ── */
    var SUPA_URL = 'https://puufrlhhdjsqnbseayvh.supabase.co';
    var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dWZybGhoZGpzcW5ic2VheXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzIxNzMsImV4cCI6MjA5MTg0ODE3M30.yByTKkvnlWV5MNAT8Coo2PUKhBOeQWxgtIFdSsd3hbg';

    function openItinOverlay() {
      if (document.querySelector('.itin-overlay')) return;

      // Build overlay shell
      var ov = document.createElement('div');
      ov.className = 'itin-overlay';
      ov.innerHTML =
        '<div class="itin-overlay-top">' +
          '<div><h2>🗓️ All Itineraries</h2><p>Click any package to open the editor</p></div>' +
          '<button class="itin-close-btn" id="itinCloseBtn">✕</button>' +
        '</div>' +
        '<div class="itin-overlay-body">' +
          '<div class="itin-spinner"></div>' +
        '</div>';
      document.body.appendChild(ov);

      document.getElementById('itinCloseBtn').addEventListener('click', function() {
        ov.remove();
        // Remove active from itin nav item
        var ni = document.querySelector('.itin-nav-item');
        if (ni) ni.classList.remove('active');
      });

      // Fetch packages from Supabase
      fetch(SUPA_URL + '/rest/v1/packages?select=id,title,days,nights,start_location,hero_photo_url,created_at&order=created_at.desc', {
        headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
      })
      .then(function(r) { return r.json(); })
      .then(function(pkgs) {
        var body = ov.querySelector('.itin-overlay-body');
        if (!pkgs || !pkgs.length) {
          body.innerHTML = '<div class="itin-empty"><div style="font-size:48px">📭</div><p>No itineraries found</p></div>';
          return;
        }
        var grid = document.createElement('div');
        grid.className = 'itin-cards-grid';
        pkgs.forEach(function(pkg) {
          var dur = (pkg.nights || 0) + 'N / ' + (pkg.days || 0) + 'D';
          var loc = pkg.start_location || 'Kashmir';
          var img = pkg.hero_photo_url
            ? '<img src="' + pkg.hero_photo_url + '" onerror="this.parentNode.innerHTML=\'🗺️\'" />'
            : '🗺️';
          var card = document.createElement('div');
          card.className = 'itin-card';
          card.innerHTML =
            '<div class="itin-card-img">' + img + '</div>' +
            '<div class="itin-card-body">' +
              '<div class="itin-card-title">' + (pkg.title || 'Untitled Package') + '</div>' +
              '<div class="itin-card-meta">' +
                '<span class="itin-card-tag">📅 ' + dur + '</span>' +
                '<span class="itin-card-loc">📍 ' + loc + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="itin-card-footer">' +
              '<span>Tap to edit</span>' +
              '<button class="itin-open-btn">Open →</button>' +
            '</div>';
          card.addEventListener('click', function() {
            ov.remove();
            window.location.href = '/crm/editor/' + pkg.id;
          });
          grid.appendChild(card);
        });
        body.innerHTML = '';
        body.appendChild(grid);
      })
      .catch(function() {
        ov.querySelector('.itin-overlay-body').innerHTML = '<div class="itin-empty">Failed to load. Please try again.</div>';
      });
    }

    /* ── ADD "Itinerary" NAV ITEM above Leads ── */
    function addItinNavItem() {
      var nav = document.querySelector('.nav-links');
      if (!nav) return;
      if (nav.querySelector('.itin-nav-item')) return;

      var leadsItem = null;
      nav.querySelectorAll('.nav-item').forEach(function(item) {
        if (item.innerText.trim().toLowerCase().includes('lead')) leadsItem = item;
      });

      var a = document.createElement('a');
      a.className = 'nav-item itin-nav-item';
      a.href = 'javascript:void(0)';
      a.innerHTML = '<span class="nav-icon">🗓️</span><span class="nav-label">Itinerary</span>';

      a.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        nav.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
        a.classList.add('active');
        openItinOverlay();
      });

      if (leadsItem) {
        nav.insertBefore(a, leadsItem);
      } else {
        nav.insertBefore(a, nav.firstChild);
      }
    }

    function buildTabs() {
      var section = document.querySelector('.dashboard-sections > .dashboard-section:first-child');
      if (!section) return;
      var card = section.querySelector('.glass-card');
      if (!card) return;
      var table = card.querySelector('table');
      if (!table) return;
      var rows = Array.prototype.slice.call(table.querySelectorAll('tbody tr'));
      if (!rows.length) return;

      // Already built with same count — skip
      var existing = card.querySelector('.itin-tabs');
      if (existing && existing.children.length === rows.length) return;
      if (existing) existing.remove();

      // Hide the raw table
      table.style.cssText = 'display:none!important';

      var list = document.createElement('div');
      list.className = 'itin-tabs';

      rows.forEach(function(row) {
        var cells = row.cells;
        if (!cells || cells.length < 4) return;

        var iconEl = cells[0].querySelector('.pkg-mini-img');
        var icon   = iconEl ? iconEl.textContent.trim() : '🗺️';
        var nameEl = cells[0].querySelector('span');
        var name   = nameEl ? nameEl.textContent.trim() : cells[0].textContent.trim();
        var dur    = cells[1].textContent.trim();
        var loc    = cells[2].textContent.trim().split(',')[0];
        var editBtn = cells[3].querySelector('.btn');   // first visible btn = ✏️

        var tab = document.createElement('div');
        tab.className = 'itin-tab';
        tab.innerHTML =
          '<span class="itin-tab-icon">' + icon + '</span>' +
          '<span class="itin-tab-info">' +
            '<span class="itin-tab-name">' + name + '</span>' +
            '<span class="itin-tab-meta">' + dur + ' &nbsp;·&nbsp; ' + loc + '</span>' +
          '</span>' +
          '<span class="itin-tab-arr">›</span>';

        tab.addEventListener('click', function() {
          if (editBtn) editBtn.click();
        });

        list.appendChild(tab);
      });

      card.appendChild(list);
    }

    /* ── BOTTOM NAV (mobile) ── */
    var MOB_ROUTES = [
      { label: 'Overview',  icon: '📊', href: '/crm' },
      { label: 'Itinerary', icon: '🗓️', href: null },   // null = opens overlay
      { label: 'Leads',     icon: '👥', href: '/crm/leads' },
      { label: 'Bookings',  icon: '📅', href: '/crm/bookings' },
      { label: 'Settings',  icon: '⚙️', href: '/crm/admin' }
    ];

    function buildBottomNav() {
      if (window.innerWidth > 768) return;
      if (document.querySelector('.mob-bottom-nav')) {
        updateBottomNavActive(); return;
      }
      var nav = document.createElement('nav');
      nav.className = 'mob-bottom-nav';
      MOB_ROUTES.forEach(function(route) {
        var btn = document.createElement('a');
        btn.className = 'mob-nav-item';
        btn.href = route.href || 'javascript:void(0)';
        btn.innerHTML = '<span class="mob-nav-icon">' + route.icon + '</span><span>' + route.label + '</span>';
        if (route.href === null) {
          btn.addEventListener('click', function(e) { e.preventDefault(); openItinOverlay(); });
        } else {
          btn.addEventListener('click', function(e) {
            e.preventDefault();
            window.history.pushState({}, '', route.href);
            window.dispatchEvent(new PopStateEvent('popstate'));
          });
        }
        nav.appendChild(btn);
      });
      document.body.appendChild(nav);
      updateBottomNavActive();
    }

    function updateBottomNavActive() {
      var nav = document.querySelector('.mob-bottom-nav');
      if (!nav) return;
      var path = window.location.pathname;
      Array.from(nav.querySelectorAll('.mob-nav-item')).forEach(function(btn, i) {
        var route = MOB_ROUTES[i];
        var active = route.href && (
          route.href === '/crm' ? path === '/crm' || path === '/crm/'
                                : path.startsWith(route.href)
        );
        btn.classList.toggle('active', !!active);
      });
    }

    window.addEventListener('popstate', function() { setTimeout(updateBottomNavActive, 100); });

    // Debounced rebuild on any DOM change
    var obs = new MutationObserver(function() {
      clearTimeout(timer);
      timer = setTimeout(function() {
        addItinNavItem();
        buildTabs();
        buildBottomNav();
      }, 120);
    });

    function init() {
      obs.observe(document.getElementById('root') || document.body, {
        childList: true, subtree: true
      });
      // Initial attempts as React hydrates
      [200, 600, 1200, 2500].forEach(function(ms) {
        setTimeout(function() {
          addItinNavItem();
          buildTabs();
          buildBottomNav();
        }, ms);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
  </body>
</html>
