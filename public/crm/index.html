/* ── SHERA CRM LIVE OVERRIDES ─────────────────────────── */
:root {
  --bg: #f4f6fb; --surface: #fff; --surface-2: #f9fafc;
  --border: #e8ecf2; --border-light: #f0f2f7;
  --primary: #3b6ff5; --primary-light: #eef2fe;
  --text-1: #0f172a; --text-2: #475569; --text-3: #94a3b8;
  --radius: 12px; --radius-lg: 16px; --radius-sm: 8px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.06); --shadow: 0 4px 16px rgba(0,0,0,.07);
  --transition: all .2s cubic-bezier(.4,0,.2,1); --sidebar-w: 240px;
}
body { font-family: 'Inter',-apple-system,sans-serif !important; background: var(--bg) !important; }

/* ── SIDEBAR NAV ── */
.sidebar-nav { width: var(--sidebar-w) !important; background: #fff !important; border-right: 1px solid var(--border) !important; padding: 24px 16px !important; backdrop-filter: none !important; }
.nav-item { padding: 10px 12px !important; border-radius: 8px !important; font-size: 13.5px !important; font-weight: 500 !important; color: var(--text-2) !important; }
.nav-item:hover { background: #f3f4f6 !important; color: var(--text-1) !important; }
.nav-item.active { background: var(--primary-light) !important; color: var(--primary) !important; font-weight: 600 !important; box-shadow: none !important; }
.main-viewport { margin-left: var(--sidebar-w) !important; padding: 28px 32px !important; background: var(--bg) !important; }
.glass-card { background: #fff !important; border: 1px solid var(--border) !important; border-radius: var(--radius-lg) !important; box-shadow: var(--shadow-sm) !important; backdrop-filter: none !important; }

/* ── STATS ── */
.stats-grid { display: grid !important; grid-template-columns: repeat(4,1fr) !important; gap: 16px !important; margin-bottom: 20px !important; }
.stat-chip, .stat-card { background: #fff !important; border: 1px solid var(--border) !important; border-radius: var(--radius-lg) !important; box-shadow: var(--shadow-sm) !important; padding: 20px !important; display: flex !important; align-items: flex-start !important; gap: 14px !important; backdrop-filter: none !important; }
.stat-chip:hover, .stat-card:hover { box-shadow: var(--shadow) !important; transform: translateY(-1px) !important; }
.stat-count, .stat-value { font-size: 28px !important; font-weight: 800 !important; color: var(--text-1) !important; letter-spacing: -0.8px !important; }
.stat-label { font-size: 11.5px !important; font-weight: 600 !important; color: var(--text-3) !important; text-transform: uppercase !important; letter-spacing: .06em !important; }
.stat-icon-wrap, .stat-icon { width: 42px !important; height: 42px !important; border-radius: 11px !important; background: var(--primary-light) !important; display: flex !important; align-items: center !important; justify-content: center !important; font-size: 20px !important; flex-shrink: 0 !important; }

/* ══════════════════════════════════════════════════════════
   DASHBOARD SECTIONS — Itinerary RIGHT sidebar, QA LEFT
══════════════════════════════════════════════════════════ */
.dashboard-sections {
  display: grid !important;
  grid-template-columns: 1fr 360px !important;
  gap: 20px !important;
  align-items: start !important;
}

/* ALL ITINERARIES → right sidebar (2nd column) */
.dashboard-sections > .dashboard-section:first-child {
  grid-column: 2 !important;
  grid-row: 1 !important;
  position: sticky !important;
  top: 20px !important;
  max-height: calc(100vh - 200px) !important;
  display: flex !important;
  flex-direction: column !important;
  overflow: hidden !important;
  border-radius: var(--radius-lg) !important;
}

/* QUICK ACTIONS → left main area (1st column) */
.dashboard-sections > .dashboard-section:last-child {
  grid-column: 1 !important;
  grid-row: 1 !important;
}

/* Section labels */
.dashboard-section .section-head {
  font-size: 11px !important;
  font-weight: 800 !important;
  text-transform: uppercase !important;
  letter-spacing: .08em !important;
  color: var(--text-3) !important;
  padding: 12px 14px 10px !important;
  margin: 0 !important;
  border-bottom: 1px solid var(--border) !important;
  background: #f8f9fb !important;
  flex-shrink: 0 !important;
}

/* Itinerary inner glass card = scrollable container */
.dashboard-sections > .dashboard-section:first-child .glass-card {
  overflow-y: auto !important;
  flex: 1 !important;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg) !important;
  border: none !important;
  box-shadow: none !important;
  max-height: calc(100vh - 270px) !important;
}

/* Wrap whole first section in card style */
.dashboard-sections > .dashboard-section:first-child {
  background: #fff !important;
  border: 1px solid var(--border) !important;
  box-shadow: var(--shadow-sm) !important;
}

/* ── EXCEL TABLE STYLES ── */
.dashboard-sections > .dashboard-section:first-child table { width: 100% !important; border-collapse: collapse !important; }
.dashboard-sections > .dashboard-section:first-child th {
  font-size: 10px !important; font-weight: 700 !important; text-transform: uppercase !important;
  letter-spacing: .07em !important; color: var(--text-3) !important;

}
.dashboard-sections > .dashboard-section:first-child td {
  padding: 8px 10px !important; font-size: 12px !important; color: var(--text-2) !important;
  border-bottom: 1px solid var(--border-light) !important; vertical-align: middle !important;
}
.dashboard-sections > .dashboard-section:first-child tr:nth-child(even) td { background: #fafbfd !important; }
.dashboard-sections > .dashboard-section:first-child tr:hover td { background: #eef2ff !important; cursor: pointer !important; }

/* ── COMPACT THUMBNAIL + NAME ── */
.pkg-mini-img { width: 28px !important; height: 28px !important; border-radius: 6px !important; object-fit: cover !important; border: 1px solid var(--border) !important; flex-shrink: 0 !important; }
.pkg-name-cell { display: flex !important; align-items: center !important; gap: 7px !important; }
.pkg-info { display: flex !important; flex-direction: column !important; gap: 1px !important; overflow: hidden !important; min-width: 0 !important; }
.pkg-info strong, .pkg-info b { font-size: 11.5px !important; font-weight: 600 !important; color: var(--text-1) !important; white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; max-width: 130px !important; display: block !important; }
.pkg-info span { font-size: 10px !important; color: var(--text-3) !important; }

/* ── HIDE DUPLICATE (📋 2nd btn) & STYLE ACTION BTNS ── */
.table-actions { display: flex !important; align-items: center !important; gap: 3px !important; }
.table-actions .btn:nth-child(2) { display: none !important; }
.table-actions .btn {
  width: 26px !important; height: 26px !important; min-width: 26px !important;
  display: inline-flex !important; align-items: center !important; justify-content: center !important;
  border-radius: 6px !important; border: 1.5px solid var(--border) !important;
  background: #fff !important; font-size: 12px !important; padding: 0 !important;
  cursor: pointer !important; transition: var(--transition) !important;
}
.table-actions .btn:hover { background: var(--primary-light) !important; border-color: var(--primary) !important; }
.table-actions .btn:last-child { border-color: #fecaca !important; background: #fff5f5 !important; }
.table-actions .btn:last-child:hover { background: #fee2e2 !important; border-color: #ef4444 !important; }

/* ── QUICK ACTIONS (shortcuts-vertical) ── */
.shortcuts-vertical { display: flex !important; flex-direction: column !important; }
.shortcut-item, .link-box {
  display: flex !important; align-items: center !important; gap: 14px !important;
  padding: 16px 20px !important; border-bottom: 1px solid var(--border-light) !important;
  cursor: pointer !important; transition: var(--transition) !important;
  text-decoration: none !important; color: inherit !important;
}
.shortcut-item:last-child, .link-box:last-child { border-bottom: none !important; }
.shortcut-item:hover, .link-box:hover { background: var(--surface-2) !important; }

/* ── ITINERARY FULL-PAGE OVERLAY ── */
.itin-overlay {
  position: fixed !important; inset: 0 !important; z-index: 9999 !important;
  background: #f4f6fb !important; display: flex !important; flex-direction: column !important;
  overflow: hidden !important;
}
.itin-overlay-top {
  display: flex !important; align-items: center !important; justify-content: space-between !important;
  padding: 20px 32px !important; background: #fff !important;
  border-bottom: 1px solid #e8ecf2 !important; flex-shrink: 0 !important;
  box-shadow: 0 2px 8px rgba(0,0,0,.04) !important;
}
.itin-overlay-top h2 { font-size: 20px !important; font-weight: 800 !important; color: #0f172a !important; letter-spacing: -0.5px !important; margin: 0 !important; }
.itin-overlay-top p { font-size: 13px !important; color: #94a3b8 !important; margin: 2px 0 0 !important; }
.itin-close-btn {
  width: 36px !important; height: 36px !important; border-radius: 50% !important;
  border: 1.5px solid #e8ecf2 !important; background: #fff !important;
  cursor: pointer !important; font-size: 18px !important; color: #475569 !important;
  display: flex !important; align-items: center !important; justify-content: center !important;
  transition: all .15s !important;
}
.itin-close-btn:hover { background: #fee2e2 !important; border-color: #ef4444 !important; color: #ef4444 !important; }
.itin-overlay-body { flex: 1 !important; overflow-y: auto !important; padding: 28px 32px !important; }
.itin-cards-grid {
  display: grid !important; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)) !important;
  gap: 18px !important;
}
.itin-card {
  background: #fff !important; border: 1px solid #e8ecf2 !important;
  border-radius: 16px !important; overflow: hidden !important;
  cursor: pointer !important; transition: all .2s !important;
  box-shadow: 0 2px 8px rgba(0,0,0,.05) !important;
  display: flex !important; flex-direction: column !important;
}
.itin-card:hover { transform: translateY(-3px) !important; box-shadow: 0 8px 24px rgba(59,111,245,.12) !important; border-color: #bfcfff !important; }
.itin-card-img { width: 100% !important; height: 160px !important; object-fit: cover !important; background: #eef2ff !important; display: flex !important; align-items: center !important; justify-content: center !important; font-size: 48px !important; flex-shrink: 0 !important; }
.itin-card-img img { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; }
.itin-card-body { padding: 16px !important; flex: 1 !important; }
.itin-card-title { font-size: 14.5px !important; font-weight: 700 !important; color: #0f172a !important; margin: 0 0 8px !important; letter-spacing: -0.2px !important; line-height: 1.3 !important; }
.itin-card-meta { display: flex !important; gap: 12px !important; flex-wrap: wrap !important; margin-bottom: 12px !important; }
.itin-card-tag { background: #eef2fe !important; color: #3b6ff5 !important; border-radius: 6px !important; padding: 3px 9px !important; font-size: 11.5px !important; font-weight: 600 !important; }
.itin-card-loc { color: #94a3b8 !important; font-size: 12px !important; display: flex !important; align-items: center !important; gap: 4px !important; }
.itin-card-footer { padding: 12px 16px !important; border-top: 1px solid #f0f2f7 !important; display: flex !important; align-items: center !important; justify-content: space-between !important; background: #fafbfd !important; }
.itin-card-footer span { font-size: 12px !important; color: #94a3b8 !important; }
.itin-open-btn { background: #3b6ff5 !important; color: #fff !important; border: none !important; border-radius: 8px !important; padding: 7px 14px !important; font-size: 12.5px !important; font-weight: 600 !important; cursor: pointer !important; transition: all .15s !important; }
.itin-open-btn:hover { background: #2554d4 !important; }
.itin-empty { text-align: center !important; padding: 60px 20px !important; color: #94a3b8 !important; }
.itin-spinner { width: 36px !important; height: 36px !important; border: 3px solid #e8ecf2 !important; border-top-color: #3b6ff5 !important; border-radius: 50% !important; animation: spin .7s linear infinite !important; margin: 60px auto !important; }

/* ── ITINERARY TABS ── */
.itin-tabs { display: flex !important; flex-direction: column !important; overflow-y: auto !important; flex: 1 !important; }
.itin-tab {
  display: flex !important; align-items: center !important; gap: 10px !important;
  padding: 11px 14px !important; border-bottom: 1px solid #f0f2f7 !important;
  cursor: pointer !important; transition: background .15s !important;
  background: #fff !important;
}
.itin-tab:hover { background: #eef2ff !important; }
.itin-tab:hover .itin-tab-arr { color: #3b6ff5 !important; transform: translateX(2px) !important; }
.itin-tab-icon { font-size: 20px !important; flex-shrink: 0 !important; }
.itin-tab-info { display: flex !important; flex-direction: column !important; gap: 2px !important; flex: 1 !important; min-width: 0 !important; overflow: hidden !important; }
.itin-tab-name { font-size: 12.5px !important; font-weight: 600 !important; color: #0f172a !important; white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; display: block !important; }
.itin-tab-meta { font-size: 10.5px !important; color: #94a3b8 !important; display: block !important; }
.itin-tab-arr { font-size: 13px !important; color: #cbd5e1 !important; flex-shrink: 0 !important; transition: all .15s !important; }

/* ── RESPONSIVE ── */
@media (max-width: 1100px) {
  .dashboard-sections { grid-template-columns: 1fr !important; }
  .dashboard-sections > .dashboard-section:first-child { grid-column: 1 !important; grid-row: 2 !important; position: static !important; max-height: 400px !important; }
  .dashboard-sections > .dashboard-section:last-child { grid-column: 1 !important; grid-row: 1 !important; }
  .stats-grid { grid-template-columns: repeat(2,1fr) !important; }
}
  </style>
  <body>
    <div id="root"></div>
  <script>
  (function() {
    var timer;

    /* ── ITINERARY OVERLAY ── */
    var SUPA_URL = 'https://puufrlhhdjsqnbseayvh.supabase.co';
    var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1dWZybGhoZGpzcW5ic2VheXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzIxNzMsImV4cCI6MjA5MTg0ODE3M30.yByTKkvnlWV5MNAT8Coo2PUKhBOeQWxgtIFdSsd3hbg';

    function openItinOverlay() {
      if (document.querySelector('.itin-overlay')) return;

      // Build overlay shell
      var ov = document.createElement('div');
      ov.className = 'itin-overlay';
      ov.innerHTML =
        '<div class="itin-overlay-top">' +
          '<div><h2>🗓️ All Itineraries</h2><p>Click any package to open the editor</p></div>' +
          '<button class="itin-close-btn" id="itinCloseBtn">✕</button>' +
        '</div>' +
        '<div class="itin-overlay-body">' +
          '<div class="itin-spinner"></div>' +
        '</div>';
      document.body.appendChild(ov);

      document.getElementById('itinCloseBtn').addEventListener('click', function() {
        ov.remove();
        // Remove active from itin nav item
        var ni = document.querySelector('.itin-nav-item');
        if (ni) ni.classList.remove('active');
      });

      // Fetch packages from Supabase
      fetch(SUPA_URL + '/rest/v1/packages?select=id,title,days,nights,start_location,hero_photo_url,created_at&order=created_at.desc', {
        headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
      })
      .then(function(r) { return r.json(); })
      .then(function(pkgs) {
        var body = ov.querySelector('.itin-overlay-body');
        if (!pkgs || !pkgs.length) {
          body.innerHTML = '<div class="itin-empty"><div style="font-size:48px">📭</div><p>No itineraries found</p></div>';
          return;
        }
        var grid = document.createElement('div');
        grid.className = 'itin-cards-grid';
        pkgs.forEach(function(pkg) {
          var dur = (pkg.nights || 0) + 'N / ' + (pkg.days || 0) + 'D';
          var loc = pkg.start_location || 'Kashmir';
          var img = pkg.hero_photo_url
            ? '<img src="' + pkg.hero_photo_url + '" onerror="this.parentNode.innerHTML=\'🗺️\'" />'
            : '🗺️';
          var card = document.createElement('div');
          card.className = 'itin-card';
          card.innerHTML =
            '<div class="itin-card-img">' + img + '</div>' +
            '<div class="itin-card-body">' +
              '<div class="itin-card-title">' + (pkg.title || 'Untitled Package') + '</div>' +
              '<div class="itin-card-meta">' +
                '<span class="itin-card-tag">📅 ' + dur + '</span>' +
                '<span class="itin-card-loc">📍 ' + loc + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="itin-card-footer">' +
              '<span>Tap to edit</span>' +
              '<button class="itin-open-btn">Open →</button>' +
            '</div>';
          card.addEventListener('click', function() {
            ov.remove();
            window.location.href = '/crm/editor/' + pkg.id;
          });
          grid.appendChild(card);
        });
        body.innerHTML = '';
        body.appendChild(grid);
      })
      .catch(function() {
        ov.querySelector('.itin-overlay-body').innerHTML = '<div class="itin-empty">Failed to load. Please try again.</div>';
      });
    }

    /* ── ADD "Itinerary" NAV ITEM above Leads ── */
    function addItinNavItem() {
      var nav = document.querySelector('.nav-links');
      if (!nav) return;
      if (nav.querySelector('.itin-nav-item')) return;

      var leadsItem = null;
      nav.querySelectorAll('.nav-item').forEach(function(item) {
        if (item.innerText.trim().toLowerCase().includes('lead')) leadsItem = item;
      });

      var a = document.createElement('a');
      a.className = 'nav-item itin-nav-item';
      a.href = 'javascript:void(0)';
      a.innerHTML = '<span class="nav-icon">🗓️</span><span class="nav-label">Itinerary</span>';

      a.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        nav.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
        a.classList.add('active');
        openItinOverlay();
      });

      if (leadsItem) {
        nav.insertBefore(a, leadsItem);
      } else {
        nav.insertBefore(a, nav.firstChild);
      }
    }

    function buildTabs() {
      var section = document.querySelector('.dashboard-sections > .dashboard-section:first-child');
      if (!section) return;
      var card = section.querySelector('.glass-card');
      if (!card) return;
      var table = card.querySelector('table');
      if (!table) return;
      var rows = Array.prototype.slice.call(table.querySelectorAll('tbody tr'));
      if (!rows.length) return;

      // Already built with same count — skip
      var existing = card.querySelector('.itin-tabs');
      if (existing && existing.children.length === rows.length) return;
      if (existing) existing.remove();

      // Hide the raw table
      table.style.cssText = 'display:none!important';

      var list = document.createElement('div');
      list.className = 'itin-tabs';

      rows.forEach(function(row) {
        var cells = row.cells;
        if (!cells || cells.length < 4) return;

        var iconEl = cells[0].querySelector('.pkg-mini-img');
        var icon   = iconEl ? iconEl.textContent.trim() : '🗺️';
        var nameEl = cells[0].querySelector('span');
        var name   = nameEl ? nameEl.textContent.trim() : cells[0].textContent.trim();
        var dur    = cells[1].textContent.trim();
        var loc    = cells[2].textContent.trim().split(',')[0];
        var editBtn = cells[3].querySelector('.btn');   // first visible btn = ✏️

        var tab = document.createElement('div');
        tab.className = 'itin-tab';
        tab.innerHTML =
          '<span class="itin-tab-icon">' + icon + '</span>' +
          '<span class="itin-tab-info">' +
            '<span class="itin-tab-name">' + name + '</span>' +
            '<span class="itin-tab-meta">' + dur + ' &nbsp;·&nbsp; ' + loc + '</span>' +
          '</span>' +
          '<span class="itin-tab-arr">›</span>';

        tab.addEventListener('click', function() {
          if (editBtn) editBtn.click();
        });

        list.appendChild(tab);
      });

      card.appendChild(list);
    }

    // Debounced rebuild on any DOM change
    var obs = new MutationObserver(function() {
      clearTimeout(timer);
      timer = setTimeout(function() {
        addItinNavItem();
        buildTabs();
      }, 120);
    });

    function init() {
      obs.observe(document.getElementById('root') || document.body, {
        childList: true, subtree: true
      });
      // Initial attempts as React hydrates
      [200, 600, 1200, 2500].forEach(function(ms) {
        setTimeout(function() {
          addItinNavItem();
          buildTabs();
        }, ms);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
  </body>
